# Triggers an EAS iOS build (internal distribution) using Expo's CI pattern.
# https://docs.expo.dev/build/building-on-ci/
#
# Required GitHub repository secrets:
#   EXPO_TOKEN       — Personal access token from https://expo.dev/accounts/[account]/settings/access-tokens
#   EAS_PROJECT_ID   — UUID from your linked EAS project (output of `npx eas-cli init` or Expo dashboard).
#
# iOS internal distribution still requires Apple credentials on the Expo project before this job
# can succeed in non-interactive mode. Run `eas build --platform ios --profile preview` once locally
# (interactive) or finish setup in the Expo dashboard if the build fails on credentials.
#
# Cursor Cloud Agent terminals do not receive Cursor "secrets" as environment variables,
# so use this workflow (or run `eas build` locally) to deploy with a token.

name: EAS iOS preview

on:
  workflow_dispatch:

jobs:
  build:
    name: Trigger EAS iOS build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Trigger iOS internal build on EAS
        run: eas build --platform ios --profile preview --non-interactive --no-wait
        env:
          EAS_PROJECT_ID: ${{ secrets.EAS_PROJECT_ID }}
