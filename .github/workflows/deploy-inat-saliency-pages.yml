# Optional: publish docs/inat-saliency-web/ as the GitHub Pages site root.
# Requires Pages to be configured for "GitHub Actions" in repository Settings.

name: Deploy iNat saliency web to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-inat-saliency-web
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/inat-saliency-web
      - id: deployment
        uses: actions/deploy-pages@v4
